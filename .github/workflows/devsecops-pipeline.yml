name: Vulnerable DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
jobs:
  build-and-test:
    name: Build, Test, and Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Software Composition Analysis (SCA) with pip-audit
        # continue-on-error allows the demo to show all failures in one run
        continue-on-error: true 
        run: pip-audit -r requirements.txt

      - name: Run Unit Tests with Pytest
        continue-on-error: true
        run: python -m pytest tests/ -v

      - name: Build Docker image
        run: docker build -t vulnerable-app:${{ github.sha }} .

      - name: Container Vulnerability Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # This will enforce the hard failure of the pipeline
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
